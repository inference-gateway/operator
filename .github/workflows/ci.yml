---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TASK_VERSION: "3.48.0"
  GOLANGCI_LINT_VERSION: "v2.12.2"
  CONTROLLER_GEN_VERSION: "v0.20.1"
  KUSTOMIZE_VERSION: "v5.8.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the code
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --help

      - name: Run linter
        run: task lint

  generate:
    name: Generate & Verify Clean State
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the code
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install prettier
        run: |
          npm install -g prettier@3.6.2

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --help

      - name: Install Controllergen
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ env.CONTROLLER_GEN_VERSION }}

      - name: Install Kustomize
        run: |
          go install sigs.k8s.io/kustomize/kustomize/v5@${{ env.KUSTOMIZE_VERSION }}

      - name: Verify dependencies installed
        run: |
          task --version || (echo "task not installed" && exit 1)
          controller-gen --version || (echo "controller-gen not installed" && exit 1)
          kustomize version || (echo "kustomize not installed" && exit 1)
          prettier --version || (echo "prettier not installed" && exit 1)

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run code generation
        run: task generate

      - name: Run manifest generation
        run: task manifests

      - name: Run formatting
        run: task fmt

      - name: Check for dirty state
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Working directory is dirty after running generate, manifests, and fmt tasks:"
            git status --porcelain
            echo ""
            echo "Please run the following commands locally and commit the changes:"
            echo "  go mod tidy"
            echo "  task generate"
            echo "  task manifests" 
            echo "  task fmt"
            echo ""
            echo "Diff:"
            git diff
            exit 1
          else
            echo "✅ Working directory is clean - all generated files are up to date"
          fi

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the code
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install prettier
        run: |
          npm install -g prettier@3.6.2

      - name: Install task
        uses: arduino/setup-task@v2.0.0
        with:
          version: ${{ env.TASK_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Controllergen
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ env.CONTROLLER_GEN_VERSION }}

      - name: Install Kustomize
        run: |
          go install sigs.k8s.io/kustomize/kustomize/v5@${{ env.KUSTOMIZE_VERSION }}

      - name: Verify dependencies installed
        run: |
          task --version || (echo "task not installed" && exit 1)
          controller-gen --version || (echo "controller-gen not installed" && exit 1)
          kustomize version || (echo "kustomize not installed" && exit 1)
          prettier --version || (echo "prettier not installed" && exit 1)

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run build
        run: task build
