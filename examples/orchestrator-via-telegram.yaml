---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: "true"
---
# Provider API keys. Replace with real values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-providers-secret
  namespace: inference-gateway
type: Opaque
stringData:
  DEEPSEEK_API_KEY: "REPLACE_WITH_DEEPSEEK_API_KEY"
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
spec:
  environment: development
  server:
    host: "0.0.0.0"
    port: 8080
  providers:
    - name: DeepSeek
      enabled: true
      env:
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: DEEPSEEK_API_KEY
---
# Telegram bot credentials. Replace the placeholder values before applying.
#
#   token         - The bot token issued by @BotFather.
#   allowedUsers  - Comma-separated Telegram user IDs allowed to interact with the bot.
apiVersion: v1
kind: Secret
metadata:
  name: telegram-bot-credentials
  namespace: inference-gateway
type: Opaque
stringData:
  token: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"
  allowedUsers: "REPLACE_WITH_TELEGRAM_USER_IDS"
---
# Namespace for the A2A worker agents the Orchestrator will fan out to.
apiVersion: v1
kind: Namespace
metadata:
  name: agents
  labels:
    inference-gateway.com/managed: "true"
---
# Calendar agent — provides Google Calendar skills (list/create/update events).
apiVersion: core.inference-gateway.com/v1alpha1
kind: Agent
metadata:
  name: google-calendar-agent
  namespace: agents
spec:
  image: ghcr.io/inference-gateway/google-calendar-agent:latest
  timezone: "UTC"
  port: 8080
  host: "0.0.0.0"
  readTimeout: "30s"
  writeTimeout: "30s"
  idleTimeout: "60s"
  logging:
    level: "info"
    format: "json"
  telemetry:
    enabled: false
  queue:
    enabled: false
    maxSize: 0
    cleanupInterval: "5m"
  tls:
    enabled: false
    secretRef: ""
  agent:
    enabled: true
    tls:
      enabled: false
      secretRef: ""
    maxConversationHistory: 10
    maxChatCompletionIterations: 5
    maxRetries: 3
    apiKey:
      secretRef: ""
    llm:
      model: "deepseek/deepseek-v4-flash"
      maxTokens: 4096
      temperature: "0.7"
      systemPrompt: "You are a helpful assistant for managing Google Calendar events."
  env:
    - name: GOOGLE_CALENDAR_MOCK_MODE
      value: "true"
    - name: A2A_AGENT_CLIENT_PROVIDER
      value: "deepseek"
    - name: A2A_AGENT_CLIENT_MODEL
      value: "deepseek-v4-flash"
    - name: A2A_AGENT_CLIENT_BASE_URL
      value: "http://inference-gateway.inference-gateway.svc.cluster.local:8080/v1"
    - name: A2A_AGENT_CLIENT_API_KEY
      value: "not-used-by-gateway-in-this-example"
---
# Mock agent — useful for testing the orchestrator's A2A fan-out without a real backend.
apiVersion: core.inference-gateway.com/v1alpha1
kind: Agent
metadata:
  name: mock-agent
  namespace: agents
spec:
  image: ghcr.io/inference-gateway/mock-agent:latest
  timezone: "UTC"
  port: 8080
  host: "0.0.0.0"
  readTimeout: "30s"
  writeTimeout: "30s"
  idleTimeout: "60s"
  logging:
    level: "info"
    format: "json"
  telemetry:
    enabled: false
  queue:
    enabled: false
    maxSize: 0
    cleanupInterval: "5m"
  tls:
    enabled: false
    secretRef: ""
  agent:
    enabled: true
    tls:
      enabled: false
      secretRef: ""
    maxConversationHistory: 10
    maxChatCompletionIterations: 5
    maxRetries: 3
    apiKey:
      secretRef: ""
    llm:
      model: "deepseek/deepseek-v4-flash"
      maxTokens: 4096
      temperature: "0.7"
      systemPrompt: "You are a mock agent for testing."
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Orchestrator
metadata:
  name: orchestrator-controlled-by-telegram
  namespace: inference-gateway
spec:
  image: ghcr.io/inference-gateway/cli:latest
  channels:
    maxWorkers: 5
    imageRetention: 5
    requireApproval: true
    telegram:
      enabled: true
      tokenSecretRef:
        name: telegram-bot-credentials
        key: token
      allowedUsersSecretRef:
        name: telegram-bot-credentials
        key: allowedUsers
      pollTimeout: 30s
  gateway:
    url: http://inference-gateway.inference-gateway.svc.cluster.local:8080
  agent:
    model: deepseek/deepseek-v4-flash
    systemPrompt: "You are a helpful assistant running as a Telegram bot. You can delegate calendar tasks to the calendar agent and use the mock agent for testing."
  tools:
    enabled: true
    schedule: true
  a2a:
    enabled: true
    agents:
      - http://google-calendar-agent.agents.svc.cluster.local:8080
      - http://mock-agent.agents.svc.cluster.local:8080
