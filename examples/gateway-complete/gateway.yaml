---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: "true"
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
spec:
  environment: development
  image: "ghcr.io/inference-gateway/inference-gateway:latest"
  # ServiceAccount configuration for RBAC
  # serviceAccount:
  #   create: true
  #   name: "custom-gateway-sa"
  hpa:
    enabled: true
    config:
      minReplicas: 3
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 80
  telemetry:
    enabled: true
    metrics:
      enabled: true
      port: 9464
  server:
    timeouts:
      read: "60s"
      write: "60s"
      idle: "300s"
    tls:
      enabled: false
      # When enabled, the operator automatically mounts the Ingress TLS secret into
      # the backend pod for end-to-end TLS. Override with certificateRef/keyRef.
  auth:
    enabled: false
    provider: oidc
    oidc:
      issuerUrl: "https://keycloak.inference-gateway.local/realms/inference-gateway-realm"
      clientId: "inference-gateway-client"
      clientSecretRef:
        name: inference-gateway-auth-secret
        key: OIDC_CLIENT_SECRET
  providers:
    - name: OpenAI
      enabled: false
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: OPENAI_API_KEY
    - name: Anthropic
      enabled: false
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: ANTHROPIC_API_KEY
    - name: Groq
      enabled: true
      env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: GROQ_API_KEY
    - name: Cohere
      enabled: true
      env:
        - name: COHERE_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: COHERE_API_KEY
    - name: Cloudflare
      enabled: true
      env:
        - name: CLOUDFLARE_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: CLOUDFLARE_API_KEY
    - name: DeepSeek
      enabled: true
      env:
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: DEEPSEEK_API_KEY
    - name: Ollama
      enabled: true
      env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: OLLAMA_API_KEY
    - name: Google
      enabled: true
      env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: GOOGLE_API_KEY
    - name: Custom
      enabled: true
      env:
        - name: CUSTOM_API_URL
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: CUSTOM_API_URL
        - name: CUSTOM_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: CUSTOM_API_KEY
  mcp:
    enabled: false
    expose: false
    timeouts:
      client: "10s"
      dial: "5s"
      tlsHandshake: "5s"
      responseHeader: "5s"
      request: "10s"
    servers:
      - name: filesystem-server
        url: "http://mcp-filesystem.mcp.svc.cluster.local:8080"
        healthCheck:
          enabled: true
          path: "/health"
          interval: "30s"
      - name: git-server
        url: "http://mcp-git.mcp.svc.cluster.local:8080"
        healthCheck:
          enabled: true
          path: "/health"
          interval: "30s"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  ingress:
    enabled: true
    host: "api.inference-gateway.local"
    annotations:
      cert-manager.io/cluster-issuer: "selfsigned-cluster-issuer"
    tls:
      enabled: true
      secretName: inference-gateway-tls
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-auth-secret
  namespace: inference-gateway
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: ""
---
