---
apiVersion: v1
kind: Namespace
metadata:
  name: agents
  labels:
    inference-gateway.com/managed: "true"
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Agent
metadata:
  name: google-calendar-agent
  namespace: agents
spec:
  image: ghcr.io/inference-gateway/google-calendar-agent:latest
  agent:
    llm:
      baseURL: "http://inference-gateway.inference-gateway.svc.cluster.local:8080/v1"
      model: "openai/gpt-4o"
      apiKeySecretRef:
        name: inference-gateway-providers-secret
        key: OPENAI_API_KEY
  env:
    - name: GOOGLE_CALENDAR_MOCK_MODE
      value: "true"
    - name: A2A_AGENT_URL
      value: "http://google-calendar-agent.agents.svc.cluster.local:8080"
