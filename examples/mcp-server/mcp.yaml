---
# Single-instance standalone MCP server example.
#
# This deploys `mcp-memory-server` — a minimal Go MCP built with the same
# `metoro-io/mcp-golang` library that the Inference Gateway uses on its client
# side. The image is built locally (no public registry is involved); build &
# import it into your k3d cluster first:
#
#   cd mcp-memory-server
#   docker build -t mcp-memory-server:dev .
#   k3d image import mcp-memory-server:dev --cluster dev
#
# In-cluster Streamable HTTP endpoint (the operator appends `spec.server.path`,
# defaulting to `/mcp`, to the constructed service URL):
#   http://mcp-memory-server-service.mcp.svc.cluster.local:8080/mcp
apiVersion: v1
kind: Namespace
metadata:
  name: mcp
  labels:
    inference-gateway.com/managed: "true"
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: MCP
metadata:
  name: mcp-memory-server
  namespace: mcp
spec:
  image: mcp-memory-server:dev
  hpa:
    enabled: true
  server:
    port: 8080
    # path defaults to "/mcp" - explicit here for clarity.
    path: "/mcp"
