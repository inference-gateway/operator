---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: "true"
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
spec:
  environment: development
  image: "ghcr.io/inference-gateway/inference-gateway:latest"
  # modelRouting turns on gateway-native round-robin routing. A client requests a
  # logical alias (e.g. {"model": "fast-chat"}) and the gateway rotates round-robin
  # through the alias's deployments, forwarding to the resolved provider/model.
  #
  # This maps to ROUTING_ENABLED=true and ROUTING_CONFIG_PATH on the gateway
  # container. The operator renders `config` into a ConfigMap and mounts it.
  #
  # Note: this is unrelated to spec.routing, which configures north-south
  # Kubernetes Gateway API traffic.
  modelRouting:
    enabled: true
    config: |
      models:
        fast-chat:
          strategy: round_robin # only strategy in Phase 1; omit to default to round_robin
          deployments:
            - provider: groq
              model: llama-3.3-70b-versatile
            - provider: openai
              model: gpt-4o-mini
    # Alternatively, reference an existing ConfigMap instead of inline config:
    # configMapRef:
    #   name: my-routing-config
    #   key: routing.yaml
  providers:
    # Each deployment's provider must be a configured provider (its API key/URL
    # are set the usual way).
    - name: OpenAI
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: OPENAI_API_KEY
    - name: Groq
      env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: GROQ_API_KEY
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-providers-secret
  namespace: inference-gateway
type: Opaque
stringData:
  OPENAI_API_KEY: ""
  GROQ_API_KEY: ""
