---
# Two instances of `mcp-server-time` - a minimal MCP server written in Go using
# the same `metoro-io/mcp-golang` library that the inference-gateway uses on
# its client side. This eliminates any cross-implementation capability
# mismatches and gives us a known-good end-to-end test of MCP discovery.
#
# Build & import (one-time) before applying this file:
#   cd mcp-server-time
#   docker build -t mcp-server-time:dev .
#   k3d image import mcp-server-time:dev --cluster dev
#
# The label `mcp-group: group1` tags each MCP into a group; any Orchestrator
# (or Gateway) whose `mcp.serviceDiscovery.selector` matches that label will
# discover it and write it into `~/.infer/mcp.yaml` inside the orchestrator pod
# (or into `MCP_SERVERS` on the gateway pod).
#
# In-cluster Streamable HTTP endpoints (the operator appends `spec.server.path`,
# defaulting to `/mcp`, to the constructed service URL):
#   http://mcp-time-a-service.mcp.svc.cluster.local:8080/mcp
#   http://mcp-time-b-service.mcp.svc.cluster.local:8080/mcp
apiVersion: core.inference-gateway.com/v1alpha1
kind: MCP
metadata:
  name: mcp-time-a
  namespace: mcp
  labels:
    mcp-group: group1
spec:
  image: mcp-server-time:dev
  server:
    port: 8080
    # path defaults to "/mcp" - explicit here for clarity.
    path: "/mcp"
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: MCP
metadata:
  name: mcp-time-b
  namespace: mcp
  labels:
    mcp-group: group1
spec:
  image: mcp-server-time:dev
  server:
    port: 8080
    path: "/mcp"
