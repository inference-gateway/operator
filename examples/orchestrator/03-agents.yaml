---
# Calendar agent - provides Google Calendar skills (list/create/update/delete events).
# Runs in mock mode so it works without real Google credentials.
apiVersion: core.inference-gateway.com/v1alpha1
kind: Agent
metadata:
  name: google-calendar-agent
  namespace: agents
spec:
  image: ghcr.io/inference-gateway/google-calendar-agent:latest
  agent:
    llm:
      baseURL: "http://inference-gateway.inference-gateway.svc.cluster.local:8080/v1"
      model: "deepseek/deepseek-v4-flash"
      apiKeySecretRef:
        name: inference-gateway-providers-secret
        key: DEEPSEEK_API_KEY
  env:
    - name: GOOGLE_CALENDAR_MOCK_MODE
      value: "true"
---
# Mock agent - useful for testing the orchestrator's A2A fan-out without a real backend.
apiVersion: core.inference-gateway.com/v1alpha1
kind: Agent
metadata:
  name: mock-agent
  namespace: agents
spec:
  image: ghcr.io/inference-gateway/mock-agent:latest
  agent:
    llm:
      baseURL: "http://inference-gateway.inference-gateway.svc.cluster.local:8080/v1"
      model: "deepseek/deepseek-v4-flash"
      apiKeySecretRef:
        name: inference-gateway-providers-secret
        key: DEEPSEEK_API_KEY
