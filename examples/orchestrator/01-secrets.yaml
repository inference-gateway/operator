---
# Provider API keys for the Gateway.
#
#   DEEPSEEK_API_KEY  - Get one at https://platform.deepseek.com
#                       (or swap to any provider supported by the Inference Gateway).
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-providers-secret
  namespace: inference-gateway
type: Opaque
stringData:
  DEEPSEEK_API_KEY: "REPLACE_WITH_DEEPSEEK_API_KEY"
---
# Telegram channel credentials for the Orchestrator.
#
#   token         - The bot token issued by @BotFather (https://t.me/BotFather).
#   allowedUsers  - Comma-separated Telegram user IDs allowed to message the bot.
#                   Get yours by DM'ing @userinfobot on Telegram.
apiVersion: v1
kind: Secret
metadata:
  name: telegram-bot-credentials
  namespace: inference-gateway
type: Opaque
stringData:
  token: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"
  allowedUsers: "REPLACE_WITH_TELEGRAM_USER_IDS"
