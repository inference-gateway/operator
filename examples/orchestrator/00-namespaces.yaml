---
# Hosts the Gateway, the Orchestrator, and provider/channel credentials.
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: "true"
---
# Hosts the A2A worker Agents the Orchestrator delegates work to.
apiVersion: v1
kind: Namespace
metadata:
  name: agents
  labels:
    inference-gateway.com/managed: "true"
---
# Hosts MCP servers discovered by the Orchestrator (and optionally the Gateway).
apiVersion: v1
kind: Namespace
metadata:
  name: mcp
  labels:
    inference-gateway.com/managed: "true"
