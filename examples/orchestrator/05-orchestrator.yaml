---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Orchestrator
metadata:
  name: orchestrator
  namespace: inference-gateway
spec:
  image: ghcr.io/inference-gateway/cli:latest
  env:
    - name: TZ
      value: "Europe/Berlin"
    # Store conversations in Redis so they survive pod restarts.
    # The Redis instance is deployed by 04-redis.yaml in the same namespace.
    - name: INFER_STORAGE_ENABLED
      value: "true"
    - name: INFER_STORAGE_TYPE
      value: "redis"
    - name: INFER_STORAGE_REDIS_HOST
      value: "redis.inference-gateway.svc.cluster.local"
    - name: INFER_STORAGE_REDIS_PORT
      value: "6379"
  channels:
    maxWorkers: 5
    imageRetention: 5
    requireApproval: true
    # Telegram is the only channel currently implemented. Future channels (Slack,
    # Discord, etc.) can be added under `channels:` alongside this one.
    telegram:
      enabled: true
      tokenSecretRef:
        name: telegram-bot-credentials
        key: token
      allowedUsersSecretRef:
        name: telegram-bot-credentials
        key: allowedUsers
      pollTimeout: 30s
  gateway:
    url: http://inference-gateway.inference-gateway.svc.cluster.local:8080
  agent:
    model: deepseek/deepseek-v4-flash
    systemPrompt: "You are a helpful assistant. You can delegate calendar tasks to the calendar agent and use the mock agent for testing."
  tools:
    enabled: true
    schedule: true
  a2a:
    enabled: true
    # Static agents list (kept for backward compatibility).
    # When serviceDiscovery is enabled, discovered agents are also added to
    # ~/.infer/agents.yaml and take precedence on URL collision.
    agents: []
    serviceDiscovery:
      enabled: true
      # namespace defaults to the Orchestrator's own namespace when omitted.
      namespace: agents
      selector:
        matchLabels:
          orchestrator: orchestrator
