---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
spec:
  environment: development
  server:
    host: "0.0.0.0"
    port: 8080
  providers:
    - name: DeepSeek
      enabled: true
      env:
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: DEEPSEEK_API_KEY
  mcp:
    enabled: true
    # Discover MCP CRs labeled `mcp-group: group1` in the `mcp` namespace.
    # Their URLs are appended to MCP_SERVERS on the gateway pod and reflected
    # in status.mcpServers / status.mcpServerCount (the MCPS column).
    serviceDiscovery:
      enabled: true
      namespace: mcp
      selector:
        matchLabels:
          mcp-group: group1
