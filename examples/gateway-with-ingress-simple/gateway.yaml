---
apiVersion: v1
kind: Namespace
metadata:
  name: inference-gateway
  labels:
    inference-gateway.com/managed: "true"
---
apiVersion: core.inference-gateway.com/v1alpha1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-gateway
spec:
  environment: development
  image: "ghcr.io/inference-gateway/inference-gateway:latest"
  providers:
    - name: OpenAI
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: inference-gateway-providers-secret
              key: OPENAI_API_KEY
  ingress:
    enabled: true
    host: "api.inference-gateway.local"
    # Defaults applied automatically by the operator:
    #   className: "nginx"   (auto-detected from the cluster)
    #   path: "/"  pathType: "Prefix"
    #   TLS enabled with auto-generated secret name
    #   cert-manager issuer: selfsigned-issuer (development) / letsencrypt-prod (production)
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
---
apiVersion: v1
kind: Secret
metadata:
  name: inference-gateway-providers-secret
  namespace: inference-gateway
type: Opaque
stringData:
  OPENAI_API_KEY: ""
