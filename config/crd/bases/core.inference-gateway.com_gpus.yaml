---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: gpus.core.inference-gateway.com
spec:
  group: core.inference-gateway.com
  names:
    categories:
    - inference-gateway
    kind: GPU
    listKind: GPUList
    plural: gpus
    shortNames:
    - gpu
    singular: gpu
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Lifecycle phase
      jsonPath: .status.phase
      name: PHASE
      type: string
    - description: Inference endpoint URL
      jsonPath: .status.url
      name: URL
      type: string
    - description: Provider allocation ID
      jsonPath: .status.instanceID
      name: INSTANCE
      type: string
    - description: Age of the resource
      jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GPU is the Schema for the gpus API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              GPUSpec defines the desired state of GPU.

              A GPU resource represents one externally managed, GPU-backed inference-runtime
              allocation reachable over HTTP. The Kubernetes cluster is the control plane
              only: GPU hardware, drivers, scheduling and inference execution stay with an
              external infrastructure provider (e.g. RunPod). It is NOT a worker node, a
              device, an `nvidia.com/gpu` request, or a replacement for the device plugin/DRA.
            properties:
              command:
                description: Command overrides the container command/args passed to
                  the runtime.
                items:
                  type: string
                type: array
              credentialsRef:
                description: |-
                  CredentialsRef references a Secret key holding the provider management API
                  key. The credential is read at reconcile time and is never written into
                  status, events, or the connection Secret.
                properties:
                  key:
                    description: The key of the secret to select from.  Must be a
                      valid secret key.
                    type: string
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  optional:
                    description: Specify whether the Secret or its key must be defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              endpoint:
                description: Endpoint configures the HTTP port and readiness path
                  of the runtime.
                properties:
                  port:
                    default: 8080
                    description: Port is the HTTP port the runtime listens on inside
                      the instance.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  readinessPath:
                    default: /
                    description: |-
                      ReadinessPath is the HTTP path polled to confirm inference readiness.
                      Ready=True is only reported once this path responds successfully.
                    pattern: ^/.*
                    type: string
                type: object
              gpuTypes:
                description: |-
                  GPUTypes is an ordered preference list of provider GPU type identifiers
                  (e.g. "NVIDIA RTX A6000"). The provider selects the first available.
                items:
                  type: string
                minItems: 1
                type: array
              image:
                description: Image is the container image the provider runs on the
                  GPU instance.
                type: string
              maxRuntime:
                description: |-
                  MaxRuntime is the maximum lifetime of the allocation. When it elapses the
                  allocation is released and the resource transitions to Expired. Required.
                type: string
              provider:
                default: runpod
                description: Provider selects the GPU infrastructure provider driver.
                enum:
                - runpod
                type: string
            required:
            - credentialsRef
            - endpoint
            - gpuTypes
            - image
            - maxRuntime
            - provider
            type: object
          status:
            description: GPUStatus defines the observed state of GPU.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              connectionSecretRef:
                description: |-
                  ConnectionSecretRef references the Secret holding the runtime URL and a
                  per-allocation credential (never the provider API key).
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              expiresAt:
                description: ExpiresAt is StartedAt + MaxRuntime, after which the
                  allocation is released.
                format: date-time
                type: string
              instanceID:
                description: InstanceID is the provider's allocation identifier.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  for this resource.
                format: int64
                type: integer
              phase:
                description: Phase is a high-level summary of the allocation lifecycle.
                enum:
                - Pending
                - Provisioning
                - Starting
                - Ready
                - Terminating
                - Expired
                - Failed
                type: string
              startedAt:
                description: StartedAt is when the allocation was requested.
                format: date-time
                type: string
              url:
                description: URL is the resolved HTTP endpoint of the inference runtime.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
