schema-version = "1.11.0"

[install]
go.pkg-path = "go"
go.version = "^1.26.2"
claude-code.pkg-path = "claude-code"
claude-code.version = "2.1.141"
go-task.pkg-path = "go-task"
go-task.version = "3.48.0"
ctlptl.pkg-path = "ctlptl"
ctlptl.version = "0.9.3"
k3d.pkg-path = "k3d"
k3d.version = "5.8.3"
kubectl.pkg-path = "kubectl"
kubectl.version = "1.36.1"
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "2.12.2"
gh.pkg-path = "gh"
gh.version = "2.92.0"
kubebuilder.pkg-path = "kubebuilder"
kubebuilder.version = "4.13.1"
kubernetes-code-generator.pkg-path = "kubernetes-code-generator"
kubernetes-code-generator.version = "0.25.4"
kustomize.pkg-path = "kustomize"
kustomize.version = "5.8.1"
prettier.pkg-path = "prettier"
prettier.version = "3.6.2"
infer.flake = "github:inference-gateway/cli/v0.109.8"

[hook]
on-activate = """
  export GOENV="$FLOX_ENV_CACHE/goenv"
  go get .
"""
